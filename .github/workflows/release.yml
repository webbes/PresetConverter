name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            executable: PresetConverter.exe
          - os: ubuntu-latest
            runtime: linux-x64
            executable: PresetConverter
          - os: macos-latest
            runtime: osx-x64
            executable: PresetConverter

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish single-file app
        shell: pwsh
        run: >
          dotnet publish PresetConverter/PresetConverter.csproj
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          -p:TrimMode=partial
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output artifacts/publish/${{ matrix.runtime }}

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/packages | Out-Null
          $runtime = "${{ matrix.runtime }}"
          $package = "artifacts/packages/PresetConverter-$runtime.zip"
          Compress-Archive -Path "artifacts/publish/$runtime/*" -DestinationPath $package -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: PresetConverter-${{ matrix.runtime }}
          path: artifacts/packages/PresetConverter-${{ matrix.runtime }}.zip

  release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_NOTES: Self-contained, trimmed, single-file PresetConverter builds. Download the package for your operating system, extract it, and run the PresetConverter executable.
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/*.zip --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --title "$TAG_NAME" --notes "$RELEASE_NOTES"
          else
            gh release create "$TAG_NAME" release-assets/*.zip --repo "$GITHUB_REPOSITORY" --title "$TAG_NAME" --notes "$RELEASE_NOTES"
          fi
